    <script>
      // Navigation functionality for buttons
      document.addEventListener("DOMContentLoaded", function () {
        // "Book a Pickup" button - goes to contact page (booking form)
        const bookButtons = document.querySelectorAll("button");
        const bookPickupBtn = Array.from(bookButtons).find(
          (btn) =>
            btn.textContent.includes("Book a Pickup") ||
            btn.textContent.includes("Book"),
        );

        if (bookPickupBtn) {
          bookPickupBtn.addEventListener("click", function (e) {
            window.location.href = "contact.html";
          });
        }

        // "How it works" button - scrolls to how-it-works section or goes to about page
        const howItWorksBtn = Array.from(bookButtons).find((btn) =>
          btn.textContent.includes("How it works"),
        );

        if (howItWorksBtn) {
          howItWorksBtn.addEventListener("click", function (e) {
            // Check if there's a how-it-works section on the page
            const howItWorksSection = document.getElementById("how-it-works");
            if (howItWorksSection) {
              howItWorksSection.scrollIntoView({ behavior: "smooth" });
            } else {
              // Fallback: go to about page
              window.location.href = "about.html";
            }
          });
        }

        // Optional: Add "Get 10% off" promo click handler
        const promoElement = document.querySelector(".flex.items-center.gap-2");
        if (promoElement && promoElement.textContent.includes("10% off")) {
          promoElement.style.cursor = "pointer";
          promoElement.addEventListener("click", function () {
            window.location.href = "contact.html?promo=first10";
          });
        }
      });
    </script>
